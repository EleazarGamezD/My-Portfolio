<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Portfolio Profesional</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Professional portfolio showcasing projects, skills, and experience in software development." />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="Portfolio Owner" />
  <link rel="canonical" href="/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Portfolio Profesional" />
  <meta property="og:description" content="Professional portfolio showcasing projects, skills, and experience in software development." />
  <meta property="og:image" content="/assets/og-image.png" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:locale:alternate" content="es_ES" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Portfolio Profesional" />
  <meta name="twitter:description" content="Professional portfolio showcasing projects, skills, and experience in software development." />
  <meta name="twitter:image" content="/assets/og-image.png" />

  <!-- hreflang -->
  <link rel="alternate" hreflang="en" href="/en" />
  <link rel="alternate" hreflang="es" href="/es" />
  <link rel="alternate" hreflang="x-default" href="/en" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Portfolio Owner",
    "url": "/",
    "sameAs": [],
    "jobTitle": "Software Developer",
    "description": "Professional portfolio showcasing projects, skills, and experience in software development."
  }
  </script>

  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <!-- google fonts preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body class="overflow-x-hidden" data-mobile-nav-style="classic">
  <app-root></app-root>

  <!-- Script para reinicializar componentes después de cambios de ruta -->
  <script>

    // Esta función permite reinicializar los componentes manualmente si es necesario
    function reinitTemplateComponents() {
      if (window.templateBridge && typeof window.templateBridge.reinitAll === 'function') {
        window.templateBridge.reinitAll();
      }
    }

    // Detectar cuando Angular ha terminado de renderizar
    window.addEventListener('DOMContentLoaded', function () {
      console.log('🚀 DOM cargado, esperando inicialización de Angular...');
    });
  </script>
</body>
</html>
