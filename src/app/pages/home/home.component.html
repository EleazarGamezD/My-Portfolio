<div #portfolioView class="home-view">
  <!-- start banner slider -->
  <app-home-banner-slider />
  <!-- end banner slider -->

  <!-- start small about section -->
  <div id="small-about"></div>
  <app-small-about-resume />
  <!-- end small about section -->

  <!-- start features section -->
  <div id="skills"></div>
  <app-features />
  <!-- end features section -->

  <!-- start career path section -->
  <div id="career-path"></div>
  <app-career-path />
  <!-- end career path section -->

  <!-- start slider projects section -->
  <div id="slider-projects"></div>
  <app-slider-projects />
  <!-- end slider projects section -->

  <!-- start hello section section -->
  <div id="hello"></div>
  <div id="contact-me"></div>
  <app-contact-me-hello />
  <!-- end hello section section -->

  <!-- start contact me section -->
  @defer (on viewport) {
    <app-contact-me />
  } @placeholder {
    <div class="deferred-section-placeholder" aria-hidden="true"></div>
  }
  <!-- end section -->

  <!-- start cvs section -->
  <div id="cvs"></div>
  @defer (on viewport) {
    <app-cv />
  } @placeholder {
    <div class="deferred-section-placeholder" aria-hidden="true"></div>
  }
  <!-- end cvs section -->

  <!-- start work reference section -->
  <div id="work-references"></div>
  @defer (on viewport) {
    <app-work-references />
  } @placeholder {
    <div class="deferred-section-placeholder" aria-hidden="true"></div>
  }
  <!-- end work reference section -->
</div>
