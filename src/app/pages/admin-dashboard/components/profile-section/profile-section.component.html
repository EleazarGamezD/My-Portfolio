<c-card class="admin-section-card">
    <c-card-body>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="card-title mb-0">Profile</h5>
            <button cButton color="primary" size="sm" type="button" (click)="saveProfile.emit()" [disabled]="saveLoading || !profile">
                Save Profile
            </button>
        </div>
        <div *ngIf="contentLoading" class="d-flex align-items-center gap-2 text-body-secondary">
            <c-spinner size="sm" color="primary"></c-spinner>
            <span>Loading profile...</span>
        </div>
        <div *ngIf="!contentLoading && profile" class="row g-3">
            <div class="col-md-6">
                <div class="dashboard-detail-card">
                    <span class="dashboard-detail-label">Name</span>
                    <strong>{{ getLocalizedText(profile.label) }}</strong>
                </div>
            </div>
            <div class="col-md-6">
                <div class="dashboard-detail-card">
                    <span class="dashboard-detail-label">Title</span>
                    <strong>{{ getLocalizedText(profile.title) }}</strong>
                </div>
            </div>
            <div class="col-md-6">
                <div class="dashboard-detail-card">
                    <span class="dashboard-detail-label">Availability</span>
                    <input cFormControl sizing="sm" type="text" [(ngModel)]="profile.availability" />
                </div>
            </div>
            <div class="col-md-6">
                <div class="dashboard-detail-card">
                    <span class="dashboard-detail-label">Location</span>
                    <input cFormControl sizing="sm" type="text" [(ngModel)]="profile.location" />
                </div>
            </div>
            <div class="col-md-6">
                <div class="dashboard-detail-card">
                    <span class="dashboard-detail-label">Email</span>
                    <input cFormControl sizing="sm" type="email" [(ngModel)]="profile.email" />
                </div>
            </div>
            <div class="col-md-6">
                <div class="dashboard-detail-card">
                    <span class="dashboard-detail-label">Phone</span>
                    <input cFormControl sizing="sm" type="text" [(ngModel)]="profile.phone" />
                </div>
            </div>
        </div>
        <p *ngIf="!contentLoading && !profile" class="text-muted mb-0">No profile found.</p>
    </c-card-body>
</c-card>
