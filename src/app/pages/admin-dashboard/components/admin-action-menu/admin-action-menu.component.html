<c-dropdown variant="btn-group" [popperOptions]="{ strategy: 'fixed' }">
  <button cButton cDropdownToggle class="action-trigger" color="primary" size="sm" aria-label="Acciones">
    <svg cIcon name="cilSettings"></svg>
  </button>
  <ul cDropdownMenu>
    @if (canEdit && editLink) {
      <li><a cDropdownItem [routerLink]="editLink">Editar</a></li>
    }
    @if (canEdit && !editLink) {
      <li><button cDropdownItem (click)="onAction('edit', $event)">Editar</button></li>
    }
    @if (canDeactivate) {
      <li><button cDropdownItem (click)="onAction('deactivate', $event)">{{ deactivateLabel }}</button></li>
    }
    @if (canDelete) {
      <li><button cDropdownItem (click)="onAction('delete', $event)">Eliminar</button></li>
    }
  </ul>
</c-dropdown>
