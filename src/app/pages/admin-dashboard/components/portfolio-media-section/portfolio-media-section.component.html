<c-card class="admin-section-card">
  <c-card-body>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h5 class="card-title mb-0">Media del portfolio</h5>
        <p class="text-body-secondary small mb-0">Configura logo, fotos, fondos y decorativos que usa la vista publica.</p>
      </div>
      <button cButton color="primary" size="sm" type="button" (click)="saveProfile.emit()" [disabled]="saveLoading || !profile">
        Guardar media
      </button>
    </div>

    <div *ngIf="contentLoading" class="d-flex align-items-center gap-2 text-body-secondary">
      <c-spinner size="sm" color="primary"></c-spinner>
      <span>Cargando media...</span>
    </div>

    <div *ngIf="!contentLoading && profile" class="portfolio-media-grid">
      <app-photo-editor
        [assets]="getSingleAsset('headerLogo')"
        [maxPhotos]="1"
        [variant]="'single'"
        [title]="'Logo del header'"
        [subTitle]="'Logo principal de la navegacion.'"
        [emptyLabel]="'Agregar logo'"
        (assetsChange)="setSingleAsset('headerLogo', $event)"
        (uploadError)="imageUploadError.emit($event)" />

      <app-photo-editor
        [assets]="getSingleAsset('footerCenterImage')"
        [maxPhotos]="1"
        [variant]="'single'"
        [title]="'Imagen central del footer'"
        [subTitle]="'Badge o elemento visual del pie de pagina.'"
        [emptyLabel]="'Agregar imagen'"
        (assetsChange)="setSingleAsset('footerCenterImage', $event)"
        (uploadError)="imageUploadError.emit($event)" />

      <app-photo-editor
        [assets]="getSingleAsset('aboutPrimaryImage')"
        [maxPhotos]="1"
        [variant]="'single'"
        [title]="'Foto sobre mi A'"
        [subTitle]="'Primera imagen del bloque Sobre mi.'"
        [emptyLabel]="'Agregar foto'"
        (assetsChange)="setSingleAsset('aboutPrimaryImage', $event)"
        (uploadError)="imageUploadError.emit($event)" />

      <app-photo-editor
        [assets]="getSingleAsset('aboutSecondaryImage')"
        [maxPhotos]="1"
        [variant]="'single'"
        [title]="'Foto sobre mi B'"
        [subTitle]="'Segunda imagen del bloque Sobre mi.'"
        [emptyLabel]="'Agregar foto'"
        (assetsChange)="setSingleAsset('aboutSecondaryImage', $event)"
        (uploadError)="imageUploadError.emit($event)" />

      <app-photo-editor
        [assets]="getSingleAsset('cvHeroBackground')"
        [maxPhotos]="1"
        [variant]="'single'"
        [title]="'Fondo hero CV'"
        [subTitle]="'Fondo superior de la seccion de hojas de vida.'"
        [emptyLabel]="'Agregar fondo'"
        (assetsChange)="setSingleAsset('cvHeroBackground', $event)"
        (uploadError)="imageUploadError.emit($event)" />

      <app-photo-editor
        [assets]="getSingleAsset('cvSectionBackground')"
        [maxPhotos]="1"
        [variant]="'single'"
        [title]="'Fondo contenido CV'"
        [subTitle]="'Fondo del cuerpo de la seccion de hojas de vida.'"
        [emptyLabel]="'Agregar fondo'"
        (assetsChange)="setSingleAsset('cvSectionBackground', $event)"
        (uploadError)="imageUploadError.emit($event)" />

      <app-photo-editor
        [assets]="getSingleAsset('heroSlideFallbackImage')"
        [maxPhotos]="1"
        [variant]="'single'"
        [title]="'Fallback slider home'"
        [subTitle]="'Imagen de respaldo para slides sin media.'"
        [emptyLabel]="'Agregar fallback'"
        (assetsChange)="setSingleAsset('heroSlideFallbackImage', $event)"
        (uploadError)="imageUploadError.emit($event)" />

      <app-photo-editor
        [assets]="getSingleAsset('projectFallbackImage')"
        [maxPhotos]="1"
        [variant]="'single'"
        [title]="'Fallback proyectos'"
        [subTitle]="'Imagen de respaldo para cards de proyecto.'"
        [emptyLabel]="'Agregar fallback'"
        (assetsChange)="setSingleAsset('projectFallbackImage', $event)"
        (uploadError)="imageUploadError.emit($event)" />

      <app-photo-editor
        [assets]="getSingleAsset('decorativeCloudIcon')"
        [maxPhotos]="1"
        [variant]="'single'"
        [title]="'Decorativo nube'"
        [subTitle]="'Icono lateral de la seccion de CV.'"
        [emptyLabel]="'Agregar decorativo'"
        (assetsChange)="setSingleAsset('decorativeCloudIcon', $event)"
        (uploadError)="imageUploadError.emit($event)" />

      <app-photo-editor
        [assets]="getSingleAsset('decorativeWebDevelopmentIcon')"
        [maxPhotos]="1"
        [variant]="'single'"
        [title]="'Decorativo web dev'"
        [subTitle]="'Icono lateral de la seccion de CV.'"
        [emptyLabel]="'Agregar decorativo'"
        (assetsChange)="setSingleAsset('decorativeWebDevelopmentIcon', $event)"
        (uploadError)="imageUploadError.emit($event)" />

      <app-photo-editor
        [assets]="getSingleAsset('decorativeMultitaskIcon')"
        [maxPhotos]="1"
        [variant]="'single'"
        [title]="'Decorativo multitarea'"
        [subTitle]="'Decorativo de la seccion de proyectos.'"
        [emptyLabel]="'Agregar decorativo'"
        (assetsChange)="setSingleAsset('decorativeMultitaskIcon', $event)"
        (uploadError)="imageUploadError.emit($event)" />

      <app-photo-editor
        [assets]="getSingleAsset('decorativeApiIcon')"
        [maxPhotos]="1"
        [variant]="'single'"
        [title]="'Decorativo API'"
        [subTitle]="'Decorativo de proyectos y trayectoria.'"
        [emptyLabel]="'Agregar decorativo'"
        (assetsChange)="setSingleAsset('decorativeApiIcon', $event)"
        (uploadError)="imageUploadError.emit($event)" />

      <app-photo-editor
        [assets]="getSingleAsset('decorativeServerIcon')"
        [maxPhotos]="1"
        [variant]="'single'"
        [title]="'Decorativo server'"
        [subTitle]="'Decorativo de testimonios.'"
        [emptyLabel]="'Agregar decorativo'"
        (assetsChange)="setSingleAsset('decorativeServerIcon', $event)"
        (uploadError)="imageUploadError.emit($event)" />

      <app-photo-editor
        [assets]="getSingleAsset('decorativeRainDigits')"
        [maxPhotos]="1"
        [variant]="'single'"
        [title]="'Decorativo rain digits'"
        [subTitle]="'Patron repetido de la seccion de trayectoria.'"
        [emptyLabel]="'Agregar decorativo'"
        (assetsChange)="setSingleAsset('decorativeRainDigits', $event)"
        (uploadError)="imageUploadError.emit($event)" />

      <app-photo-editor
        [assets]="getSingleAsset('decorativeWebBackground')"
        [maxPhotos]="1"
        [variant]="'single'"
        [title]="'Decorativo web background'"
        [subTitle]="'Ilustracion de apoyo en trayectoria.'"
        [emptyLabel]="'Agregar decorativo'"
        (assetsChange)="setSingleAsset('decorativeWebBackground', $event)"
        (uploadError)="imageUploadError.emit($event)" />

    </div>

    <p *ngIf="!contentLoading && !profile" class="text-muted mb-0">No se encontro el perfil.</p>
  </c-card-body>
</c-card>
