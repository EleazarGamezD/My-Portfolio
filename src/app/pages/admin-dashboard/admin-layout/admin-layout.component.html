<c-sidebar #adminSidebar="cSidebar" class="d-print-none border-end admin-sidebar" colorScheme="dark" id="adminSidebar" visible>
  <c-sidebar-header class="border-bottom admin-sidebar__header">
    <c-sidebar-brand [routerLink]="['/admin/dashboard/overview']" class="admin-sidebar__brand">
      <span class="admin-sidebar__brand-mark">{{ facade.currentAdmin?.displayName?.charAt(0)}}</span>
      <span class="admin-sidebar__brand-copy">
        <strong>Portfolio CMS</strong>
        <small>Made with &hearts; by <a href="https://eleazargamez.dev" target="_blank" rel="noopener noreferrer">Eleazar Gámez</a></small>
      </span>
    </c-sidebar-brand>
    <!-- Mobile-only close button — sidebar overlays content on mobile so header hamburger is hidden behind it -->
    <button [cSidebarToggle]="'adminSidebar'" toggle="visible" class="btn admin-sidebar__close-btn d-flex d-lg-none" type="button" aria-label="Close sidebar">
      <svg cIcon name="cilX" size="lg"></svg>
    </button>
  </c-sidebar-header>

  <ng-scrollbar pointerEventsMethod="scrollbar" visibility="hover">
    <c-sidebar-nav [navItems]="navItems" dropdownMode="close" compact />
  </ng-scrollbar>

  <c-sidebar-footer cSidebarToggle="adminSidebar" class="border-top d-none d-lg-flex" toggle="unfoldable">
    <button cSidebarToggler aria-label="Toggle sidebar fold"></button>
  </c-sidebar-footer>
</c-sidebar>

<div class="wrapper d-flex flex-column min-vh-100">
  <app-default-header [cShadowOnScroll]="'sm'" [currentSectionLabel]="currentSectionLabel" class="mb-4 d-print-none header header-sticky p-0 shadow-sm" position="sticky" sidebarId="adminSidebar" />
  <div class="body flex-grow-1">
    <c-container breakpoint="lg" class="h-auto px-4">
      <router-outlet />
    </c-container>
  </div>
  <app-default-footer />
</div>

<c-modal class="admin-confirmation-modal" alignment="center" backdrop="static" [visible]="facade.confirmationDialog.visible" (visibleChange)="facade.onConfirmationVisibleChange($event)">
  <c-modal-header class="admin-confirmation-modal__header">
    <h5 cModalTitle>{{ facade.confirmationDialog.title }}</h5>
  </c-modal-header>
  <c-modal-body class="admin-confirmation-modal__body">
    {{ facade.confirmationDialog.message }}
  </c-modal-body>
  <c-modal-footer class="admin-confirmation-modal__footer">
    <button cButton class="admin-confirmation-modal__cancel" type="button" (click)="facade.cancelPendingAction()">
      Cancel
    </button>
    <button cButton class="admin-confirmation-modal__confirm" type="button" (click)="facade.confirmPendingAction()">
      {{ facade.confirmationDialog.confirmLabel }}
    </button>
  </c-modal-footer>
</c-modal>
