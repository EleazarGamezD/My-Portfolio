<section>
    <app-projects-list
      [projects]="facade.projects"
      [loading]="facade.contentLoading"
      [actionLoadingKey]="facade.actionLoadingKey"
      [pagination]="facade.projectsPagination"
      (pageChange)="facade.changeProjectsPage($event)"
      (deleteProject)="facade.deleteProject($event)"
      (deactivateProject)="facade.deactivateProject($event)">
    </app-projects-list>
</section>
