<section>
    <div class="admin-page-header">
        <div>
            <p class="admin-page-kicker">Documents</p>
            <h2 class="admin-page-title">Resumes</h2>
            <p class="admin-page-copy mb-0">Upload, replace and activate downloadable CV files for the public portfolio.</p>
        </div>
    </div>

    <app-admin-resumes-section [resumes]="facade.resumes" [newResume]="facade.newResume" [contentLoading]="facade.contentLoading" [actionLoadingKey]="facade.actionLoadingKey" (createResume)="facade.createResume()" (saveResume)="facade.saveContentItem('resumes', $event)" (deleteResume)="facade.deleteContentItem('resumes', $event)" (newResumeFileSelected)="facade.onNewResumeFileSelected($event)" (resumeFileSelected)="facade.onResumeFileSelected($event.item, $event.event)"></app-admin-resumes-section>
</section>
