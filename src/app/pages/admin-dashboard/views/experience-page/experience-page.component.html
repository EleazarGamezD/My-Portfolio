<section>
  <app-experience-list
    [items]="facade.experience"
    [loading]="facade.contentLoading"
    [actionLoadingKey]="facade.actionLoadingKey"
    (deleteExperience)="facade.deleteContentItem('experience', $event)"
    (reorderExperience)="facade.reorderExperience($event.previousIndex, $event.currentIndex)">
  </app-experience-list>
</section>
