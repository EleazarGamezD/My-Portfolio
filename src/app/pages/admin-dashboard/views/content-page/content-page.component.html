<section>
  <div class='base-shell'>
    @if (!isOrderedCvContent) {
      <div class="admin-page-header">
        <div>
          <p class="admin-page-kicker">{{ config.kicker }}</p>
          <h2 class="admin-page-title">{{ config.sectionTitle }}</h2>
          <p class="admin-page-copy mb-0">{{ config.description }}</p>
        </div>
      </div>
    }

    @if (config.variant === 'skills') {
      <app-admin-skills-section [sectionTitle]="config.sectionTitle" [createTitle]="config.createTitle" [emptyMessage]="config.emptyMessage" [skills]="skillItems" [draft]="skillDraft" [contentLoading]="facade.contentLoading" [actionLoadingKey]="facade.actionLoadingKey" [pagination]="skillPagination" (createSkill)="createSkill()" (saveSkill)="saveSkill($event)" (deleteSkill)="deleteSkill($event)" (draftIconAssetsChange)="facade.onTechSkillDraftIconAssetsChange($event)" (skillIconAssetsChange)="facade.onTechSkillIconAssetsChange($event.skill, $event.assets)" (imageUploadError)="facade.onImageUploadError($event)" (pageChange)="changeSkillPage($event)">
      </app-admin-skills-section>
    } @else {
      @if (isOrderedCvContent) {
        <app-ordered-cv-content-list [variant]="config.variant === 'education' ? 'education' : 'certifications'" [items]="items" [loading]="facade.contentLoading" [actionLoadingKey]="facade.actionLoadingKey" (deleteItem)="facade.deleteContentItem(config.resourceName, $event)" (reorderItems)="reorderOrderedCvContent($event.previousIndex, $event.currentIndex)">
        </app-ordered-cv-content-list>
      } @else {
        <app-admin-content-section [sectionTitle]="config.sectionTitle" [createTitle]="config.createTitle" [emptyMessage]="config.emptyMessage" [resourceKey]="config.resourceName" [variant]="config.variant" [items]="items" [draft]="draft" [contentLoading]="facade.contentLoading" [actionLoadingKey]="facade.actionLoadingKey" (createItem)="facade.createContentItem(config.resourceName)" (saveItem)="facade.saveContentItem(config.resourceName, $event)" (deleteItem)="facade.deleteContentItem(config.resourceName, $event)"></app-admin-content-section>
      }
    }

  </div>
</section>
