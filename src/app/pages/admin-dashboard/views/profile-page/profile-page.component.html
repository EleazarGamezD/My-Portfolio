<section>
    <div class="admin-page-header">
        <div>
            <p class="admin-page-kicker">Profile Settings</p>
            <h2 class="admin-page-title">Profile</h2>
            <p class="admin-page-copy mb-0">Update the portfolio owner metadata exposed on the public site.</p>
        </div>
    </div>

    <app-admin-profile-section [profile]="facade.profile" [contentLoading]="facade.contentLoading" [saveLoading]="facade.isActionLoading('profile-save')" (saveProfile)="facade.saveProfile()" (heroSlideImageAssetsChange)="facade.onHeroSlideImageAssetsChange($event.index, $event.assets)" (imageUploadError)="facade.onImageUploadError($event)"></app-admin-profile-section>
</section>
