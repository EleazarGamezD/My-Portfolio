<section>
  <div class="base-shell">
    <div class="admin-page-header">
      <div>
        <p class="admin-page-kicker">Analítica</p>
        <h2 class="admin-page-title">Resumen</h2>
        <p class="admin-page-copy mb-0">Métricas principales, actividad reciente y resúmenes de trafico del portafolio.</p>
      </div>
      <button cButton color="primary" variant="outline" type="button" (click)="facade.loadMetrics()">
        Actualizar datos
      </button>
    </div>

    <c-card class="admin-page-surface mb-4">
      <c-card-body>
        <div class="row g-3 align-items-end">
          <div class="col-md-2">
            <label class="form-label" for="filterYear">Ano</label>
            <input id="filterYear" type="number" class="form-control" [(ngModel)]="facade.filters.year" min="2000" max="2100" />
          </div>
          <div class="col-md-2">
            <label class="form-label" for="filterMonth">Mes</label>
            <input id="filterMonth" type="number" class="form-control" [(ngModel)]="facade.filters.month" min="1" max="12" />
          </div>
          <div class="col-md-2">
            <label class="form-label" for="filterDay">Dia</label>
            <input id="filterDay" type="number" class="form-control" [(ngModel)]="facade.filters.day" min="1" max="31" />
          </div>
          <div class="col-md-3">
            <label class="form-label" for="filterFrom">Desde</label>
            <input id="filterFrom" type="datetime-local" class="form-control" [(ngModel)]="facade.filters.from" />
          </div>
          <div class="col-md-3">
            <label class="form-label" for="filterTo">Hasta</label>
            <input id="filterTo" type="datetime-local" class="form-control" [(ngModel)]="facade.filters.to" />
          </div>
          <div class="col-12 d-flex gap-2 justify-content-end">
            <button cButton color="secondary" variant="outline" type="button" (click)="facade.clearFilters()">Limpiar</button>
            <button cButton color="primary" type="button" (click)="facade.applyFilters()">Aplicar filtros</button>
          </div>
        </div>
      </c-card-body>
    </c-card>

    <c-alert *ngIf="facade.error" color="danger" class="admin-page-message">
      {{ facade.error }}
    </c-alert>

    <div *ngIf="facade.loading" class="text-center py-5">
      <c-spinner color="primary" label="Cargando métricas del resumen"></c-spinner>
    </div>

    <app-admin-overview-section *ngIf="!facade.loading && facade.metrics" [metrics]="facade.metrics"></app-admin-overview-section>

    <c-alert *ngIf="!facade.loading && !facade.metrics" color="info">
      No hay métricas disponibles.
    </c-alert>
  </div>
</section>
