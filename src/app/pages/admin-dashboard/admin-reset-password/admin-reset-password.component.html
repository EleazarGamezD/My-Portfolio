<section class="admin-shell">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="admin-card shadow-lg">
          <div class="admin-card__body">
            <p class="admin-eyebrow">Restablecer contraseña</p>
            <h1 class="admin-title">Nueva contraseña</h1>

            @if (error) {
              <div class="alert alert-danger" role="alert">{{ error }}</div>
            }

            @if (success) {
              <div class="alert alert-success" role="alert">
                ¡Contraseña restablecida! Redirigiendo al login...
              </div>
            }

            @if (!success && !error) {
              <div class="mb-3">
                <label for="newPassword" class="form-label">Nueva contraseña</label>
                <input id="newPassword" type="password" class="form-control" [(ngModel)]="newPassword" placeholder="Mínimo 8 caracteres" autocomplete="new-password" />
              </div>
              <div class="mb-4">
                <label for="confirmPw" class="form-label">Confirmar contraseña</label>
                <input id="confirmPw" type="password" class="form-control" [(ngModel)]="confirmPassword" placeholder="Repite la contraseña" autocomplete="new-password" />
              </div>
              <button class="btn btn-primary w-100" type="button" (click)="submit()" [disabled]="loading || !newPassword || !confirmPassword">
                {{ loading ? 'Guardando...' : 'Guardar contraseña' }}
              </button>
            }

            @if (error) {
              <div class="text-center mt-3">
                <a routerLink="/admin/forgot-password" class="admin-back-link">Solicitar nuevo enlace</a>
              </div>
            }

            @if (!success) {
              <div class="text-center mt-3">
                <a routerLink="/admin/login" class="admin-back-link">← Volver al login</a>
              </div>
            }

            <div class="text-center mt-2">
              <a routerLink="/" class="admin-back-link">← Volver al portfolio</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
