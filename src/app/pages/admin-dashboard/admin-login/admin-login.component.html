<section class="admin-shell">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="admin-card shadow-lg">
          <div class="admin-card__body">
            <p class="admin-eyebrow">Admin</p>
            <h1 class="admin-title">Portfolio Control Panel</h1>
            <p class="admin-copy">Accede con tu usuario administrador para gestionar métricas y contenido dinámico.</p>

            <div *ngIf="error" class="alert alert-danger" role="alert">
              {{ error }}
            </div>

            <div *ngIf="infoMessage" class="alert alert-warning" role="alert">
              {{ infoMessage }}
            </div>

            <div class="mb-3">
              <label for="adminEmail" class="form-label">Email</label>
              <input id="adminEmail" type="email" class="form-control" [(ngModel)]="email" placeholder="admin@portfolio.com" autocomplete="username" />
            </div>

            <div class="mb-4">
              <label for="adminPassword" class="form-label">Password</label>
              <input id="adminPassword" type="password" class="form-control" [(ngModel)]="password" placeholder="Enter your password" autocomplete="current-password" />
            </div>

            <button class="btn btn-primary w-100" type="button" (click)="login()" [disabled]="loading || !email || !password">
              {{ loading ? 'Signing in...' : 'Sign in' }}
            </button>

            <div class="text-center mt-3">
              <a routerLink="/admin/forgot-password" class="text-muted small">¿Olvidaste tu contraseña?</a>
            </div>

            <div class="text-center mt-2">
              <a routerLink="/" class="admin-back-link">← Volver al portfolio</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
