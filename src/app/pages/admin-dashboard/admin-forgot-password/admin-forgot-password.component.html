<section class="admin-shell">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="admin-card shadow-lg">
          <div class="admin-card__body">
            <p class="admin-eyebrow">Recuperar acceso</p>
            <h1 class="admin-title">¿Olvidaste tu contraseña?</h1>
            <p class="admin-copy">Ingresa tu email y te enviaremos un enlace para restablecer tu contraseña (válido por 10 minutos).</p>

            <div *ngIf="error" class="alert alert-danger" role="alert">{{ error }}</div>

            <div *ngIf="sent" class="alert alert-success" role="alert">
              Si el email existe en el sistema, recibirás un enlace en breve.
            </div>

            <ng-container *ngIf="!sent">
              <div class="mb-4">
                <label for="forgotEmail" class="form-label">Email</label>
                <input id="forgotEmail" type="email" class="form-control" [(ngModel)]="email" placeholder="tu@email.com" autocomplete="email" />
              </div>
              <button class="btn btn-primary w-100" type="button" (click)="submit()" [disabled]="loading || !email">
                {{ loading ? 'Enviando...' : 'Enviar enlace' }}
              </button>
            </ng-container>

            <div class="text-center mt-3">
              <a routerLink="/admin/login" class="text-muted small">← Volver al login</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
