<section class="admin-dashboard-shell">
  <div class="dashboard-hero mb-4">
    <div>
      <p class="dashboard-eyebrow mb-1">CoreUI Workspace</p>
      <h2 class="dashboard-page-title mb-1">Portfolio Admin Dashboard</h2>
      <p class="dashboard-page-copy mb-0">Gestiona contenido, métricas y administración desde un shell modular con navegación por secciones.</p>
    </div>
  </div>

  <div class="card mb-4 dashboard-filters-card shadow-sm">
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-md-2">
          <label class="form-label" for="filterYear">Year</label>
          <input id="filterYear" type="number" class="form-control" [(ngModel)]="filters.year" min="2000" max="2100" />
        </div>
        <div class="col-md-2">
          <label class="form-label" for="filterMonth">Month</label>
          <input id="filterMonth" type="number" class="form-control" [(ngModel)]="filters.month" min="1" max="12" />
        </div>
        <div class="col-md-2">
          <label class="form-label" for="filterDay">Day</label>
          <input id="filterDay" type="number" class="form-control" [(ngModel)]="filters.day" min="1" max="31" />
        </div>
        <div class="col-md-3">
          <label class="form-label" for="filterFrom">From</label>
          <input id="filterFrom" type="datetime-local" class="form-control" [(ngModel)]="filters.from" />
        </div>
        <div class="col-md-3">
          <label class="form-label" for="filterTo">To</label>
          <input id="filterTo" type="datetime-local" class="form-control" [(ngModel)]="filters.to" />
        </div>
        <div class="col-12 d-flex gap-2 justify-content-end">
          <button class="btn btn-outline-secondary" type="button" (click)="clearFilters()">Clear</button>
          <button class="btn btn-primary" type="button" (click)="applyFilters()">Apply filters</button>
        </div>
      </div>
    </div>
  </div>

  <div class="dashboard-section-nav mb-4">
    <button *ngFor="let section of sections" type="button" class="btn dashboard-section-btn" [class.active]="activeSection === section.key" (click)="setActiveSection(section.key)">
      {{ section.label }}
    </button>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-danger" role="alert">
    {{ error }}
  </div>

  <div *ngIf="contentError" class="alert alert-warning" role="alert">
    {{ contentError }}
  </div>

  <div *ngIf="actionMessage" class="alert alert-success" role="alert">
    {{ actionMessage }}
  </div>

  <app-admin-overview-section *ngIf="activeSection === 'overview' && !loading && metrics" [metrics]="metrics"></app-admin-overview-section>

  <div *ngIf="activeSection === 'overview' && !loading && metrics" class="col-12 mt-2">
    <button class="btn btn-primary" (click)="loadMetrics()">
      Refresh Data
    </button>
  </div>

  <div *ngIf="!loading && !metrics" class="alert alert-info">
    No metrics available
  </div>

  <app-admin-projects-section *ngIf="activeSection === 'projects'" [projects]="projects" [newProject]="newProject" [newProjectStackValue]="newProjectStackValue" [newProjectCoverImageValue]="newProjectCoverImageValue" [newProjectImagesValue]="newProjectImagesValue" [contentLoading]="contentLoading" [actionLoadingKey]="actionLoadingKey" (createProject)="createProject()" (saveProject)="saveProject($event)" (deleteProject)="deleteProject($event)" (newProjectStackValueChange)="newProjectStackValue = $event" (newProjectCoverImageValueChange)="newProjectCoverImageValue = $event" (newProjectImagesValueChange)="newProjectImagesValue = $event" (projectStackChange)="onProjectStackChange($event.project, $event.value)" (projectCoverImageChange)="onProjectCoverImageChange($event.project, $event.value)" (projectImagesChange)="onProjectImagesChange($event.project, $event.value)"></app-admin-projects-section>

  <app-admin-profile-section *ngIf="activeSection === 'profile'" [profile]="profile" [contentLoading]="contentLoading" [saveLoading]="isActionLoading('profile-save')" (saveProfile)="saveProfile()"></app-admin-profile-section>

  <app-admin-content-section *ngIf="activeSection === 'skills'" sectionTitle="Tech Skills" createTitle="Create Skill" emptyMessage="No skills found." resourceKey="techSkills" variant="skills" [items]="techSkills" [draft]="newContentItems.techSkills" [contentLoading]="contentLoading" [actionLoadingKey]="actionLoadingKey" (createItem)="createContentItem('techSkills')" (saveItem)="saveContentItem('techSkills', $event)" (deleteItem)="deleteContentItem('techSkills', $event)"></app-admin-content-section>

  <app-admin-content-section *ngIf="activeSection === 'experience'" sectionTitle="Experience" createTitle="Create Experience Item" emptyMessage="No experience items found." resourceKey="experience" variant="experience" [items]="experience" [draft]="newContentItems.experience" [contentLoading]="contentLoading" [actionLoadingKey]="actionLoadingKey" (createItem)="createContentItem('experience')" (saveItem)="saveContentItem('experience', $event)" (deleteItem)="deleteContentItem('experience', $event)"></app-admin-content-section>

  <app-admin-content-section *ngIf="activeSection === 'testimonials'" sectionTitle="Testimonials" createTitle="Create Testimonial" emptyMessage="No testimonials found." resourceKey="testimonials" variant="testimonials" [items]="testimonials" [draft]="newContentItems.testimonials" [contentLoading]="contentLoading" [actionLoadingKey]="actionLoadingKey" (createItem)="createContentItem('testimonials')" (saveItem)="saveContentItem('testimonials', $event)" (deleteItem)="deleteContentItem('testimonials', $event)"></app-admin-content-section>

  <app-admin-resumes-section *ngIf="activeSection === 'resumes'" [resumes]="resumes" [newResume]="newResume" [contentLoading]="contentLoading" [actionLoadingKey]="actionLoadingKey" (createResume)="createResume()" (saveResume)="saveContentItem('resumes', $event)" (deleteResume)="deleteContentItem('resumes', $event)" (newResumeFileSelected)="onNewResumeFileSelected($event)" (resumeFileSelected)="onResumeFileSelected($event.item, $event.event)"></app-admin-resumes-section>

  <app-admin-content-section *ngIf="activeSection === 'socialLinks'" sectionTitle="Social Links" createTitle="Create Social Link" emptyMessage="No social links found." resourceKey="socialLinks" variant="socialLinks" [items]="socialLinks" [draft]="newContentItems.socialLinks" [contentLoading]="contentLoading" [actionLoadingKey]="actionLoadingKey" (createItem)="createContentItem('socialLinks')" (saveItem)="saveContentItem('socialLinks', $event)" (deleteItem)="deleteContentItem('socialLinks', $event)"></app-admin-content-section>

  <app-admin-users-section *ngIf="activeSection === 'users'" [adminUsers]="adminUsers" [contentLoading]="contentLoading" [currentAdminId]="currentAdmin?._id" [actionLoadingKey]="actionLoadingKey" (saveUser)="saveAdminUser($event)"></app-admin-users-section>
</section>
