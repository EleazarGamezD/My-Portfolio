<img
  class="hero-slide-image"
  data-loader-critical="true"
  [src]="backgroundImage"
  [alt]="title || 'Hero slide'"
  [attr.fetchpriority]="priority ? 'high' : 'auto'"
  [attr.loading]="priority ? 'eager' : 'lazy'"
  decoding="async"
  (load)="onImageLoad()"
/>
<div class="opacity-light bg-gradient-nero-grey-brown"></div>
<div class="container h-100">
  <div class="row align-items-center h-100 justify-content-center">
    <div class="col-xl-8 col-lg-9 position-relative text-white text-center">
      <span class="fs-15 d-block mb-15px ls-4px text-uppercase" data-anime='{ "opacity": [0, 1], "easing": "easeOutCubic", "duration": 500, "delay": 200 }'>{{ description }}</span>
      <div class="alt-font fs-75 sm-fs-60 xs-fs-50 mb-40px w-80 lg-w-100 md-w-90 sm-w-100 mx-auto sm-mb-35px anime-text ls-minus-2px">
        {{ title }}
      </div>
    </div>
  </div>
</div>
