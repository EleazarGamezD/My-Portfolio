<section
  class="page-title-parallax-background bg-dark-gray ipad-top-space-margin"
  data-parallax-background-ratio="0.5"
  [style.background-image]="'url(' + backgroundImage() + ')'"
>
  <div class="opacity-very-light bg-gradient-nero-grey-brown"></div>
  <div class="container">
    <div class="row align-items-center justify-content-center">
      <div class="col-12 text-center position-relative page-title-extra-large">
        <div class="d-flex flex-column extra-small-screen">
          <div class="mt-auto">
            <h1 class="text-white alt-font mb-0 text-shadow-extra-large fw-400 ls-minus-1px">
              {{ title() }}
            </h1>
          </div>
          <!-- start breadcrumb -->
          <div
            class="mt-auto justify-content-center breadcrumb breadcrumb-style-01 text-white"
          >
            <ul
              data-anime='{ "el": "childs", "translateY": [50, 0], "opacity": [0,1], "duration": 600, "delay": 0, "staggervalue": 150, "easing": "easeOutQuad" }'
            >
              <li>{{ t('page.home') }}</li>
              <li>{{ breadcrumbLabel() || title() }}</li>
            </ul>
          </div>
          <!-- end breadcrumb -->
        </div>
      </div>
    </div>
  </div>
</section>
