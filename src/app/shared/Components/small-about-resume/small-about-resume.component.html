@if (profile) {
  <section class="background-repeat" [style.background-image]="sectionBackgroundImage">
    <div class="container">
      <div class="row">
        <div class="col-lg-5" data-anime='{ "el": "childs", "translateX": [-30, 0], "opacity": [0,1], "duration": 600, "delay": 0, "staggervalue": 300, "easing": "easeOutQuad" }'>
          <span class="fs-16 mb-10px text-base-color fw-bold d-block text-uppercase ls-2px ">{{ t('home.about.badge') }}</span>
          <h3 class="alt-font ls-minus-1px text-dark-gray mb-12 md-mb-50px sm-mb-30px">
            {{ titleText }}
          </h3>
          <img [src]="primaryImageSrc" class="border-radius-6px mb-20px w-100" [alt]="titleText" loading="eager" fetchpriority="low" decoding="async" />
        </div>
        <div class="col-lg-6 offset-lg-1" data-anime='{ "el": "childs", "translateX": [30, 0], "opacity": [0,1], "duration": 600, "delay": 0, "staggervalue": 300, "easing": "easeOutQuad" }'>
          <img class="mb-40px border-radius-6px w-100" [src]="secondaryImageSrc" [alt]="titleText" loading="eager" fetchpriority="low" decoding="async" />
          @if (primaryDescription) {
            <p class="w-90 mb-35px lg-w-100">
              {{ primaryDescription }}
            </p>
          }
          @if (secondaryDescription) {
            <p class="w-90 mb-35px lg-w-100">
              {{ secondaryDescription }}
            </p>
          }
        </div>
      </div>
    </div>
  </section>
}
