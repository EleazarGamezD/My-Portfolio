<section class="big-section">
  <div class="container">
    <div class="row overlap-section justify-content-center g-0 mb-8">
    </div>
    <div class="row align-items-center">
      <div class="col-xxl-4 col-lg-5 md-mb-15 sm-mb-20 text-center text-lg-start">
        <span class="fs-16 mb-10px text-base-color fw-bold d-block text-uppercase ls-2px ">{{ t('home.career.badge') }}</span>
        <h3 class="text-dark-gray fw-600 ls-minus-2px mb-40px">{{ t('home.career.title') }}</h3>
        <div class="row row-cols-1">
          <!-- start process step item -->
          @for(item of careerPathArray; track trackCareerItem($index, item)){ <div class="col-12 process-step-style-05 position-relative hover-box">
            <div class="process-step-item d-flex">
              <div class="process-step-icon-wrap position-relative">
                <div class="process-step-icon d-flex justify-content-center align-items-center mx-auto rounded-circle h-60px w-60px fs-16 bg-solitude-blue fw-600 position-relative">
                  <span class="number position-relative z-index-1 text-dark-gray">{{$index + 1 }}</span>
                  <div class="box-overlay bg-base-color rounded-circle"></div>
                </div>
                <span class="progress-step-separator bg-dark-gray opacity-1"></span>
              </div>
              <div class="process-content ps-30px last-paragraph-no-margin mb-30px">
                <span class="d-block fw-600 text-dark-gray mb-5px fs-18">{{ getTitle(item) }}<br>{{ getPeriod(item) }}</span>
                <p class="w-90 lg-w-100">{{ getDescription(item) }}</p>
              </div>
            </div>
          </div>}
          <!-- end process step item -->
        </div>
      </div>
      <div class="col-lg-7 offset-xxl-1 position-relative md-mb-30px sm-mb-15 career-visual">
        <img [src]="apiIcon" class="career-visual__api" alt="Technology icon" loading="lazy" />
        <img [src]="rainDigits" class="career-visual__rain career-visual__rain--center" alt="Decorative rain digits" loading="lazy" />
        <img [src]="rainDigits" class="career-visual__rain career-visual__rain--left" data-bottom-top="transform: translateY(-50px)" data-top-bottom="transform: translateY(50px)" alt="" loading="lazy" />
        <img [src]="webBackground" class="career-visual__web" data-bottom-top="transform: translateY(30px)" data-top-bottom="transform: translateY(-30px)" alt="" loading="lazy" />
        <img [src]="rainDigits" class="career-visual__rain career-visual__rain--right-top" data-bottom-top="transform: translateY(-50px)" data-top-bottom="transform: translateY(50px)" alt="" loading="lazy" />
        <img [src]="rainDigits" class="career-visual__rain career-visual__rain--right-bottom" data-bottom-top="transform: translateY(30px)" data-top-bottom="transform: translateY(-30px)" alt="" loading="lazy" />
      </div>
    </div>
  </div>
</section>
