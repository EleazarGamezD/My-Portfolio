<!-- start header -->
<header>
  <!-- start navigation -->
  <nav class="navbar navbar-expand-lg header-transparent bg-transparent center-logo disable-fixed">
    <div class="container-fluid">
      <div class="col-auto col-lg-2 menu-logo">
        <div class="d-none d-lg-block">
          <a (click)="scrollTo('cvs')" class="widget-text text-white-hover fs-16 lg-fs-15">
            <i class="feather icon-feather-file-minus icon-small me-5px lg-me-2px"></i>CV
          </a>
        </div>
        <button type="button" class="mobile-header-icon d-inline-flex d-lg-none" (click)="scrollTo('cvs')" [attr.aria-label]="t('nav.cv')">
          <i class="feather icon-feather-file-minus" aria-hidden="true"></i>
          <span>CV</span>
        </button>
        <button type="button" class="lang-btn lang-btn-mobile mobile-header-icon d-inline-flex d-lg-none" (click)="switchLanguage(alternateLanguage)" [attr.aria-label]="'Switch language to ' + alternateLanguageLabel">
          <i class="feather icon-feather-globe" aria-hidden="true"></i>
          <span>{{ alternateLanguageLabel }}</span>
        </button>
        <a class="navbar-brand" (click)="navigateTo('home')">
          <img [src]="headerLogo" alt="brand-logo" class="default-logo" fetchpriority="high" decoding="async" />
        </a>
      </div>
      <div class="col-auto col-lg-8 menu-order">
        <button class="navbar-toggler float-end" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-label="Toggle navigation">
          <span class="navbar-toggler-line"></span>
          <span class="navbar-toggler-line"></span>
          <span class="navbar-toggler-line"></span>
          <span class="navbar-toggler-line"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-between" id="navbarNav">
          <ul class="navbar-nav navbar-left justify-content-end">
            <li class="nav-item">
              <button (click)="navigateTo('home')" class="nav-link">{{ t('nav.home') }}</button>
            </li>
            <li class="nav-item">
              <button (click)="scrollTo('small-about')" class="nav-link">
                {{ t('nav.about') }}
              </button>
            </li>
            <li class="nav-item">
              <button (click)="scrollTo('skills')" class="nav-link">
                {{ t('nav.skills') }}
              </button>
            </li>
          </ul>
          <ul class="navbar-nav navbar-right justify-content-start">
            <li class="nav-item">
              <button (click)="scrollTo('slider-projects')" class="nav-link">
                {{ t('nav.projects') }}
              </button>
            </li>
            <li class="nav-item">
              <button (click)="scrollTo('career-path')" class="nav-link">
                {{ t('nav.path') }}
              </button>
            </li>
            <li class="nav-item">
              <button (click)="scrollTo('contact-me')" class="nav-link">
                {{ t('nav.contact') }}
              </button>
            </li>
            <li class="nav-item d-lg-none d-flex">
              <button (click)="scrollTo('cvs')" class="nav-link">
                {{ t('nav.cv') }}
              </button>
            </li>
            <li class="nav-item d-lg-none d-flex admin-mobile-item">
              <button type="button" class="nav-link admin-mobile-link" (click)="navigateToAdminLogin()" aria-label="Admin access">
                <span>Admin Panel</span>
                <i class="fa-solid fa-gear" aria-hidden="true"></i>
              </button>
            </li>
          </ul>
        </div>
      </div>
      <div class="col-auto col-lg-2 text-end">
        <div class="header-actions">
          <div class="language-switcher">
            <button type="button" class="lang-btn" (click)="switchLanguage(alternateLanguage)" [attr.aria-label]="'Switch language to ' + alternateLanguageLabel">
              {{ alternateLanguageLabel }}
            </button>
          </div>
          <div class="header-social-list" aria-label="Social links">
            @for (item of social; track trackSocial($index, item)) {
            <a class="header-social-link" [href]="item.href || '#'" target="_blank" rel="noopener noreferrer" [attr.title]="item.label?.[i18nService.currentLanguage()] || item.label?.es || item.label?.en || 'Social link'" [attr.aria-label]="item.label?.[i18nService.currentLanguage()] || item.label?.es || item.label?.en || 'Social link'">
              <i class="{{ item.icon }}"></i>
              <span class="header-social-text-hidden">{{ item.label?.[i18nService.currentLanguage()] || item.label?.es || item.label?.en || 'Social link' }}</span>
            </a>
            }
          </div>
          <button type="button" class="admin-trigger admin-trigger-desktop" (click)="navigateToAdminLogin()" aria-label="Admin access" title="Admin access">
            <i class="fa-solid fa-gear" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>
</header>
<!-- end header -->
