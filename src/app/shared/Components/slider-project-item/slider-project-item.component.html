<article class="project-card-shell cursor-pointer" (click)="navigateToProject()">
  <div class="project-card-media">
    <img [src]="previewImage" [alt]="title" class="project-card-image" />
    <span class="project-card-index">{{ projectIndex + 1 }}</span>
  </div>

  <div class="project-card-body">
    <div class="project-card-head">
      <span class="project-card-kicker">{{ t('project.card.category') }}</span>
      <h4 class="project-card-title">{{ title }}</h4>
    </div>

    @if (summary) {
      <p class="project-card-summary">{{ summary }}</p>
    }

    @if (stackPreview.length > 0) {
      <div class="project-card-stack">
        @for (technology of stackPreview; track technology) {
          <span class="project-card-chip">{{ technology }}</span>
        }
        @if (stackCountRemainder > 0) {
          <span class="project-card-chip project-card-chip-muted">+{{ stackCountRemainder }}</span>
        }
      </div>
    }
  </div>
</article>
