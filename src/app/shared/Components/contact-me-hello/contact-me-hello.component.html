<section class="background-repeat border-top border-color-light-gray position-relative overlap-height z-index-1">
  <div class="container">
    <div class="row mb-5 sm-mb-40px">
      <div class="col-md-6 overflow-hidden" data-anime='{ "el": "childs", "translateY": [30, 0], "opacity": [0,1], "duration": 600, "delay": 0, "staggervalue": 200, "easing": "easeOutQuad" }'>
        <h1 class="alt-font fw-700 text-dark-gray fancy-text-style-4 ls-minus-2px">
          <span [attr.data-fancy-text]="contactIntroTitleFancyConfig"></span><i class="bi bi-emoji-smile icon-extra-large ms-15px"></i>
        </h1>
      </div>
      <div class="col-md-6 last-paragraph-no-margin">
        <p class="w-85 xl-w-100" data-anime='{ "el": "lines", "translateY": [30, 0], "translateX": [30, 0], "opacity": [0,1], "duration": 600, "delay": 0, "staggervalue": 200, "easing": "easeOutQuad" }'>
          {{ contactIntroText }}
        </p>
      </div>
    </div>
  </div>
</section>
